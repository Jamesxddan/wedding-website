<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <!-- Two intertwined golden wedding rings -->
  <g fill="none" stroke-width="2.5" stroke-linecap="round">
    <!-- Left Ring (Gold color #D4AF37) -->
    <circle cx="12" cy="16" r="8" stroke="#D4AF37" />
    <!-- Right Ring (Gold color #F0C243) -->
    <circle cx="20" cy="16" r="8" stroke="#F0C243" />
    <!-- Intertwined overlapping arc -->
    <path d="M 12,8 A 8,8 0 0,1 18.25,11.25" stroke="#D4AF37" />
  </g>
  <!-- Delicate center heart in deep rose (#9d2c48) -->
  <path d="M 16,13.5 C 16,13.5 14.5,11 13.5,12 C 12.5,13 15.5,15.5 16,16 C 16.5,15.5 19.5,13 18.5,12 C 17.5,11 16,13.5 16,13.5 Z" fill="#9d2c48" />
</svg>
